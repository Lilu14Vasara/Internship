<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" method="post"  >
         <label for="fname">First Name</label>
        <input type="text" pattern="" name="fname" id="fname" placeholder="Enter Your Name"><br><br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email" required autocomplete="on" value="example.com"><br><br>


       <label for="mobile">Mobile Number</label>
        <input type="number" name="mobile" id="mobile" placeholder="+1234567890"  required ><br><br>

        <label for="color">Choose Your Favorite Color</label>
        <input type="color" name="color" id="color"><br><br>


        <label>Select your Hobbies   :</label><br>
        <label for="poetry">Poetry</label>
        <input type="checkbox" name="hobby" id="poetry"  checked><br>

        <label for="dancing">Dancing</label>
        <input type="checkbox" name="hobby" id="dancing" ><br><br>

                <label>Select your Gender   :</label><br>
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" ><br>

        <label for="dancing">Male</label>
        <input type="radio" name="gender" id="male" ><br><br>


        <label for="birthDate">Birth Date :</label>
        <input type="date" name="birthDate" id="birthDate"  required><br><br>


        <label> Select your City </label>
        <select id="city">
            
            <option value="" id="" selected >Jamnagar</option>
            <option>Bhavngar</option>
            <option> Ahemdabad</option>

        </select><br><br>


       <label for="file">Choose Your Code File</label>
        <input type="file" name="document" ><br><br>


       <label>Enter Your Password</label>
        <input type="password"  name="password" id="password" maxlength="8"  required><br><br>

        <!-- <label for="image"> Your Profile</label>
         <input type="image" src="download/esparkbiz_lilu_vasara" alt="Submit Form" width="100" height="40"> -->

         <input type="submit"  name="submit"  id="submit" >  
         <input type="reset"  id="ressetBtn">
         <script src="form.js"></script>       

    </form>
</body>
</html>
